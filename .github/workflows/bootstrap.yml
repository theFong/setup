name: Bootstrap

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bootstrap-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu latest (x86_64)
            runner: ubuntu-latest
            architecture: x86_64
          - name: Ubuntu 22.04 (x86_64)
            runner: ubuntu-22.04
            architecture: x86_64
          - name: Ubuntu 24.04 (ARM64)
            runner: ubuntu-24.04-arm
            architecture: aarch64
          - name: Ubuntu 22.04 (ARM64)
            runner: ubuntu-22.04-arm
            architecture: aarch64
          - name: macOS latest (Apple Silicon)
            runner: macos-latest
            architecture: arm64
          - name: macOS 15 (Intel)
            runner: macos-15-intel
            architecture: x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify runner architecture
        env:
          EXPECTED_ARCHITECTURE: ${{ matrix.architecture }}
        run: test "$(uname -m)" = "$EXPECTED_ARCHITECTURE"

      - name: Check shell syntax
        run: bash -n install.sh

      - name: Verify failed installs return nonzero
        run: |
          export SETUP_SKIP_MAIN=1
          source install.sh
          FAILED=""
          if assert_installed "missing test tool" setup-test-tool-does-not-exist; then
            echo "missing tool assertion unexpectedly succeeded" >&2
            exit 1
          fi
          if summary >/dev/null 2>&1; then
            echo "summary unexpectedly returned zero after a failed assertion" >&2
            exit 1
          fi

      - name: Prepare isolated home directory
        run: |
          ci_home="$RUNNER_TEMP/setup-home"
          mkdir -p "$ci_home"
          git clone --no-hardlinks "$GITHUB_WORKSPACE" "$ci_home/.setup"
          echo "HOME=$ci_home" >> "$GITHUB_ENV"

      - name: Run bootstrap
        run: bash install.sh

      - name: Add user-installed tools to PATH
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"

      - name: Verify tools and Brev skill
        run: |
          for tool in claude codex brev opencode git gh jq rg fzf wget curl htop tmux go speedtest; do
            command -v "$tool"
          done

          claude --version
          codex --version
          brev --version
          opencode --version
          go version
          speedtest --version

          test -e "$HOME/.claude/skills/brev-cli/SKILL.md"
          test -e "$HOME/.codex/skills/brev-cli/SKILL.md"
          test -e "$HOME/.agents/skills/brev-cli/SKILL.md"

      - name: Verify bootstrap is safe to re-run
        run: bash install.sh

  webshell:
    name: Webshell ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu latest (x86_64)
            runner: ubuntu-latest
          - name: Ubuntu 22.04 (x86_64)
            runner: ubuntu-22.04
          - name: Ubuntu 24.04 (ARM64)
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check shell syntax
        run: bash -n webshell/install.sh

      # install.sh's built-in verify step fails nonzero unless the service is
      # active, unauthenticated requests get 401, and the credential gets 200.
      - name: Install webshell (private mode)
        run: WEBSHELL_PASSWORD=ci-test-password webshell/install.sh

      - name: Verify unauthenticated requests are rejected
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:7681/)
          test "$code" = "401"

      - name: Verify credentials are accepted and sessions persist
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' -u "$(id -un):ci-test-password" http://127.0.0.1:7681/)
          test "$code" = "200"
          # the service's tmux session backs persistence across refreshes
          systemctl is-active ttyd

      - name: Verify install is safe to re-run (password not rotated)
        run: |
          webshell/install.sh | tee rerun.log
          grep -q "ttyd.service unchanged" rerun.log
          code=$(curl -s -o /dev/null -w '%{http_code}' -u "$(id -un):ci-test-password" http://127.0.0.1:7681/)
          test "$code" = "200"
