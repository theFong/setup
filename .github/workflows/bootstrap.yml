name: Bootstrap

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bootstrap-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu latest (x86_64)
            runner: ubuntu-latest
            architecture: x86_64
          - name: Ubuntu 22.04 (x86_64)
            runner: ubuntu-22.04
            architecture: x86_64
          - name: Ubuntu 24.04 (ARM64)
            runner: ubuntu-24.04-arm
            architecture: aarch64
          - name: Ubuntu 22.04 (ARM64)
            runner: ubuntu-22.04-arm
            architecture: aarch64
          - name: macOS latest (Apple Silicon)
            runner: macos-latest
            architecture: arm64
          - name: macOS 15 (Intel)
            runner: macos-15-intel
            architecture: x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify runner architecture
        env:
          EXPECTED_ARCHITECTURE: ${{ matrix.architecture }}
        run: test "$(uname -m)" = "$EXPECTED_ARCHITECTURE"

      - name: Check shell syntax
        run: |
          bash -n install.sh
          bash -n webshell/install.sh

      - name: Verify failed installs return nonzero
        run: |
          export SETUP_SKIP_MAIN=1
          source install.sh
          FAILED=""
          if assert_installed "missing test tool" setup-test-tool-does-not-exist; then
            echo "missing tool assertion unexpectedly succeeded" >&2
            exit 1
          fi
          if summary >/dev/null 2>&1; then
            echo "summary unexpectedly returned zero after a failed assertion" >&2
            exit 1
          fi

      - name: Verify Claude settings merge and legacy-key migration
        run: |
          export SETUP_SKIP_MAIN=1
          source install.sh
          scratch="$RUNNER_TEMP/claude-settings-test"
          mkdir -p "$scratch/.claude"

          # Merge path: existing settings are preserved, the legacy top-level
          # defaultMode key is removed, and permissions.defaultMode is set.
          printf '{"model": "opus", "defaultMode": "acceptEdits"}\n' > "$scratch/.claude/settings.json"
          (HOME="$scratch" configure_claude)
          jq -e '.model == "opus" and .permissions.defaultMode == "auto" and (has("defaultMode") | not)' \
            "$scratch/.claude/settings.json"

          # Invalid JSON is left untouched rather than clobbered.
          printf 'not json\n' > "$scratch/.claude/settings.json"
          (HOME="$scratch" configure_claude)
          test "$(cat "$scratch/.claude/settings.json")" = "not json"

      - name: Prepare isolated home directory
        run: |
          ci_home="$RUNNER_TEMP/setup-home"
          mkdir -p "$ci_home"
          git clone --no-hardlinks "$GITHUB_WORKSPACE" "$ci_home/.setup"
          echo "HOME=$ci_home" >> "$GITHUB_ENV"

      - name: Run bootstrap
        run: bash install.sh

      - name: Add user-installed tools to PATH
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"

      - name: Verify tools and Brev skill
        run: |
          for tool in claude codex brev hf opencode git gh jq rg fzf wget curl htop tmux go speedtest; do
            command -v "$tool"
          done

          claude --version
          codex --version
          brev --version
          HF_HUB_DISABLE_UPDATE_CHECK=1 hf version
          opencode --version
          go version
          speedtest --version

          test -e "$HOME/.claude/skills/brev-cli/SKILL.md"
          test -e "$HOME/.codex/skills/brev-cli/SKILL.md"
          test -e "$HOME/.agents/skills/brev-cli/SKILL.md"

          jq -e '.permissions.defaultMode == "auto" and (has("defaultMode") | not)' \
            "$HOME/.claude/settings.json"

      - name: Verify bootstrap is safe to re-run
        run: bash install.sh

      # Webshell (Linux-only: requires systemd). The installer's built-in
      # verify fails nonzero unless the service is active, unauthenticated
      # requests get 401, and the credential gets 200; the curl checks below
      # re-assert that independently of the script under test.
      - name: Install webshell (private mode)
        if: runner.os == 'Linux'
        run: WEBSHELL_PASSWORD=ci-test-password webshell/install.sh

      - name: Verify webshell auth enforcement
        if: runner.os == 'Linux'
        run: |
          systemctl is-active ttyd
          test "$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:7681/)" = "401"
          test "$(curl -s -o /dev/null -w '%{http_code}' -u "$(id -un):ci-test-password" http://127.0.0.1:7681/)" = "200"
          webshell/install.sh --verify-only

      - name: Verify webshell is safe to re-run (password not rotated)
        if: runner.os == 'Linux'
        run: |
          webshell/install.sh | tee rerun.log
          grep -q "ttyd.service unchanged" rerun.log
          test "$(curl -s -o /dev/null -w '%{http_code}' -u "$(id -un):ci-test-password" http://127.0.0.1:7681/)" = "200"

      - name: Verify webshell refuses unsupported platforms cleanly
        if: runner.os == 'macOS'
        run: |
          if webshell/install.sh; then
            echo "webshell install unexpectedly succeeded on macOS" >&2
            exit 1
          fi
          # the guard must fire before anything is installed
          test ! -e /usr/local/bin/tmux-clip
          test ! -e "$HOME/.tmux.conf"
