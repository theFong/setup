# ~/.tmux.conf — tuned for the ttyd browser terminal, multi-shell control

# --- usability ---------------------------------------------------------------
set -g mouse on                 # click windows/panes, drag borders, scroll
setw -g mode-keys vi
set -g history-limit 50000      # deep scrollback
set -g base-index 1             # windows start at 1 (matches keyboard row)
setw -g pane-base-index 1
set -g renumber-windows on      # keep window numbers gapless when one closes
set -sg escape-time 10          # snappier key response
set -g focus-events on
set -g set-clipboard on
# Tell tmux the outer terminal (ttyd/xterm.js) can receive clipboard via OSC52,
# so copying in tmux pushes text straight to the browser's local clipboard.
set -as terminal-features ',*:clipboard'

# --- splits / new shells (intuitive keys) ------------------------------------
# prefix + |  = split right,  prefix + -  = split down (open in same dir)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"     # new "tab" in same dir
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Alt+number jumps straight to a window (no prefix needed) — feels like tabs
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
# Alt+Left/Right cycle windows
bind -n M-Left  previous-window
bind -n M-Right next-window

# --- mouse: clickable [+] button + copy to clipboard -------------------------
# Click a window name in the bar to switch to it.
bind -n MouseDown1Status select-window -t=
# The whole status-RIGHT area IS the "+ new shell" button. tmux's range=user
# detection is unreliable in status-right on this build, so instead of a styled
# sub-region we bind the entire right zone straight to new-window. Clock/host
# were moved to status-left so they can't accidentally trigger it.
bind -n MouseDown1StatusRight new-window -c "#{pane_current_path}"
# --- closing shells ----------------------------------------------------------
# Left "✕ close" button (status-LEFT zone) closes the current/focused window.
bind -n MouseDown1StatusLeft confirm-before -p "close this window? (y/n)" kill-window
# Middle-click a tab also closes it (only works with a real middle mouse button).
bind -n MouseDown2Status kill-window -t=
# Double-click a tab to rename it (browser-style). No -t= : the mouse context
# is gone by the time the prompt is submitted ("no mouse target") — but the
# first click of the double-click already selected the tab, so renaming the
# current window is the clicked one.
bind -n DoubleClick1Status command-prompt -I "#{window_name}" "rename-window -- '%%'"
# prefix + X : close the current window (asks y/n first).
bind X confirm-before -p "kill window #W? (y/n)" kill-window
# (Ctrl-D or typing `exit` also closes the current shell/pane.)
# Drag-select (and Enter / y in copy-mode) copy to the browser clipboard.
# tmux 3.2a's own set-clipboard/Ms emission is broken here (strace-verified:
# zero bytes written), so /usr/local/bin/tmux-clip writes the OSC52 escape
# directly to the client tty — the path proven to reach the browser.
bind -T copy-mode    MouseDragEnd1Pane send -X copy-pipe-and-cancel '/usr/local/bin/tmux-clip'
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel '/usr/local/bin/tmux-clip'
bind -T copy-mode-vi Enter             send -X copy-pipe-and-cancel '/usr/local/bin/tmux-clip'
bind -T copy-mode-vi y                 send -X copy-pipe-and-cancel '/usr/local/bin/tmux-clip'
# prefix + ] pastes the tmux buffer back in
bind ] paste-buffer

# --- tab-like status bar -----------------------------------------------------
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=colour235,fg=colour250"
# Entire left zone is a clickable "✕ close" button (see MouseDown1StatusLeft).
set -g status-left "#[bg=colour160,fg=colour255,bold]  ✕ close  #[default] "
set -g status-left-length 16
# Entire right zone is a clickable "+ new shell" button (see MouseDown1StatusRight).
set -g status-right "#[bg=colour28,fg=colour255,bold]  + new shell  #[default]"
set -g status-right-length 20
# each window renders as a clickable tab
setw -g window-status-format         " #I #W "
setw -g window-status-current-format "#[bg=colour39,fg=colour232,bold] #I #W "
setw -g window-status-separator ""

# --- session restore across reboots (tpm + resurrect + continuum) ------------
# macOS-Terminal-style persistence: window/pane layout, working directories,
# and visible pane text are auto-saved every 15 min and restored the next time
# the tmux server starts (ttyd.service starts one on connect, so after a
# reboot the same tabs come back). Processes are NOT resumed — panes reopen as
# fresh shells. Manual save: prefix + Ctrl-s, manual restore: prefix + Ctrl-r.
# continuum piggybacks its save hook on status-right; it renders zero-width,
# so the "+ new shell" button is unaffected.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'   # bring back on-screen text too
set -g @continuum-restore 'on'                 # auto-restore on server start

# initialize tpm — keep this as the last line of the file
run '~/.tmux/plugins/tpm/tpm'
